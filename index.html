<!DOCTYPE html>
<html>
<head>
    <title>Flood Monitor - Sungai Panchor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body, html { 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Open Sans', sans-serif; 
            background-color: #e3f2fd; 
            color: #333;
        }
        
        .page-container { 
            display: flex; 
            flex-direction: column; 
            padding: 40px 10% 100px 10%; 
            box-sizing: border-box; 
        }
        
        .header { 
            text-align: center; 
            background: #ffffff;
            border: 4px solid #1976d2; 
            padding: 40px;
            margin-bottom: 40px;
            border-radius: 100px 100px 40px 40px; 
            box-shadow: 0px 15px 25px rgba(0,0,0,0.1);
        }
        .header h1 { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem; 
            color: #0d47a1; 
            font-weight: 900; 
            text-transform: uppercase;
        }
        .header p { 
            margin-top: 10px;
            font-weight: 700; 
            color: #1e88e5; 
            letter-spacing: 5px;
            font-size: 1.1rem;
        }

        .dashboard-main { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr 1fr; 
            grid-template-rows: auto auto; 
            gap: 30px; 
        }
        
        .card { 
            background: white; 
            border-radius: 30px; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.06); 
            border: 1px solid #bbdefb;
        }

        /* LED Container with Labels */
        .led-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }
        .led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .led-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #78909c;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .led { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: #f1f1f1; border: 2px solid #ddd; 
            transition: 0.3s; 
        }
        .water-green { background: #4caf50; box-shadow: 0 0 15px rgba(76, 175, 80, 0.6); border-color: #2e7d32; }
        .water-yellow { background: #ffeb3b; box-shadow: 0 0 15px rgba(255, 235, 59, 0.8); border-color: #fbc02d; }
        .water-red { background: #f44336; box-shadow: 0 0 15px rgba(244, 67, 54, 0.6); border-color: #c62828; }
        .power-blue.active { background: #2196f3; box-shadow: 0 0 15px rgba(33, 150, 243, 0.6); border-color: #1565c0; }
        .tilt-orange.active { background: #ff9800; box-shadow: 0 0 15px rgba(255, 152, 0, 0.6); border-color: #ef6c00; }

        .value-big { font-size: 6rem; font-weight: 900; color: #1a237e; }
        .chart-container { grid-column: 1 / 3; min-height: 350px; }
        
        .info-label { font-size: 0.8rem; font-weight: 800; color: #546e7a; text-transform: uppercase; margin-bottom: 5px;}
        .info-data { font-size: 2.5rem; font-weight: 900; color: #263238; }

        @media only screen and (max-width: 768px) {
            .page-container { padding: 20px 5% 80px 5%; }
            .header { padding: 25px; border-radius: 50px; margin-bottom: 25px; }
            .header h1 { font-size: 1.8rem; }
            .header p { font-size: 0.7rem; letter-spacing: 2px; }
            .dashboard-main { grid-template-columns: 1fr; gap: 20px; }
            .chart-container { grid-column: 1; min-height: 280px; }
            .value-big { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="header">
        <h1>FLOOD MONITORING</h1>
        <p>SUNGAI PANCHOR, PERAK</p>
    </div>

    <div class="dashboard-main">
        <div class="card">
            <span class="info-label">Water Level Depth</span>
            <div class="value-big" id="distText">--</div>
            <span style="font-weight: 900; color: #1976d2; font-size: 1.2rem;">CM</span>
        </div>

        <div class="card">
            <div class="led-group">
                <div class="led-item">
                    <div id="ledWater" class="led"></div>
                    <span class="led-label">Water Level</span>
                </div>
                <div class="led-item">
                    <div id="ledPower" class="led"></div>
                    <span class="led-label">Power Source</span>
                </div>
                <div class="led-item">
                    <div id="ledTilt" class="led"></div>
                    <span class="led-label">Tilt Sensor</span>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="info-label">Safety Status</span>
            <div id="alarmBox" style="display:none; color: #d32f2f; text-align:center;">
                <span style="font-size: 50px;">🚨</span><br><b style="font-size: 1.5rem;">DANGER</b>
            </div>
            <div id="safeBox" style="color: #388e3c; text-align:center;">
                <span style="font-size: 50px;">✅</span><br><b style="font-size: 1.5rem;">STABLE</b>
            </div>
        </div>

        <div class="card chart-container">
            <div id="chartContainer" style="height: 100%; width: 100%;"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card" style="flex: 1;">
                <span class="info-label">Structural Tilt</span>
                <div id="tiltVal" class="info-data" style="color: #ef6c00;">X:0 Y:0</div>
            </div>
            <div class="card" style="flex: 1;">
                <span class="info-label">Precipitation</span>
                <div id="rainVal" class="info-data" style="color: #0277bd;">-</div>
            </div>
        </div>
    </div>
</div>

<script>
const broker = 'wss://00a99857651149babfcbd12d2e5e285f.s1.eu.hivemq.cloud:8884/mqtt';
const options = {
    clientId: 'Web_Panchor_' + Math.random().toString(16).substr(2, 8),
    username: 'Hashir_Normazli',
    password: 'Hashir.2807' 
};

const client = mqtt.connect(broker, options);
var dps = []; 
var chart = new CanvasJS.Chart("chartContainer", {
    backgroundColor: "transparent",
    animationEnabled: true,
    theme: "light2",
    axisY: { title: "Depth (cm)", includeZero: true, maximum: 100 },
    data: [{ type: "splineArea", color: "rgba(33, 150, 243, 0.15)", lineColor: "#1976d2", dataPoints: dps }]
});

client.on('connect', () => { client.subscribe('unimap/flood/data'); });

client.on('message', (topic, message) => {
    const data = JSON.parse(message.toString());
    document.getElementById("distText").innerText = Math.round(data.dist);
    document.getElementById("tiltVal").innerText = `X:${Math.round(data.tiltX)} Y:${Math.round(data.tiltY)}`;
    document.getElementById("rainVal").innerText = data.rain;

    const waterLed = document.getElementById("ledWater");
    const powerLed = document.getElementById("ledPower");
    const tiltLed = document.getElementById("ledTilt");
    const alarm = document.getElementById("alarmBox");
    const safe = document.getElementById("safeBox");

    waterLed.className = "led";
    if (data.dist > 40) { waterLed.classList.add("water-green"); alarm.style.display="none"; safe.style.display="block"; }
    else if (data.dist >= 30) { waterLed.classList.add("water-yellow"); alarm.style.display="none"; safe.style.display="block"; }
    else { waterLed.classList.add("water-red"); alarm.style.display="block"; safe.style.display="none"; }

    if (data.dist >= 20.0) powerLed.className = "led active power-blue";
    else powerLed.className = "led";

    if (Math.abs(data.tiltX) > 15 || Math.abs(data.tiltY) > 15) tiltLed.className = "led active tilt-orange";
    else tiltLed.className = "led";

    dps.push({x: new Date(), y: data.dist});
    if (dps.length > 20) dps.shift();
    chart.render();
});
</script>
</body>
</html>
