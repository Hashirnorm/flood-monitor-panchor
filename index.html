<!DOCTYPE html>
<html>
<head>
    <title>Flood Monitor - Sungai Panchor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Import Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* Force a light blue-ish theme */
        body, html { 
            height: auto; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Open Sans', sans-serif; 
            background-color: #e3f2fd; /* Light Blue-ish */
        }
        
        /* The container now has massive padding at the bottom */
        .page-container { 
            display: flex; 
            flex-direction: column; 
            padding: 40px 10% 100px 10%; /* 100px space at the bottom */
            box-sizing: border-box; 
        }
        
        /* Rounded Droplet Header with themed font */
        .header { 
            text-align: center; 
            background: #ffffff;
            border: 4px solid #1976d2; 
            padding: 40px;
            margin-bottom: 50px;
            border-radius: 100px 100px 30px 30px; 
            box-shadow: 0px 15px 25px rgba(0,0,0,0.1);
        }
        .header h1 { 
            margin: 0; 
            font-family: 'Montserrat', 'Arial Black', sans-serif; /* Themed Font */
            font-size: 3.2rem; 
            color: #0d47a1; 
            font-weight: 900; 
            text-transform: uppercase;
        }
        .header p { 
            margin-top: 10px;
            font-weight: 700; 
            color: #1e88e5; 
            letter-spacing: 5px;
        }

        /* The Grid has a bottom margin for safety */
        .dashboard-main { 
            display: grid; 
            grid-template-columns: 1fr 0.5fr 1fr; 
            grid-template-rows: auto auto; 
            gap: 30px; 
            margin-bottom: 50px; 
        }
        
        .card { 
            background: white; 
            border-radius: 30px; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.06); 
            border: 1px solid #bbdefb;
        }

        /* LED Styling */
        .led { width: 50px; height: 50px; border-radius: 50%; background: #eceff1; border: 2px solid #cfd8dc; margin: 15px 0; }
        .water-green { background: #4caf50; box-shadow: 0 0 15px #4caf50; }
        .water-yellow { background: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }
        .water-red { background: #f44336; box-shadow: 0 0 15px #f44336; }
        .power-blue.active { background: #2196f3; box-shadow: 0 0 15px #2196f3; }
        .tilt-orange.active { background: #ff9800; box-shadow: 0 0 15px #ff9800; }

        .value-big { font-size: 5.5rem; font-weight: 900; color: #1a237e; }
        .chart-container { grid-column: 1 / 3; min-height: 350px; }
        
        .info-label { font-size: 0.8rem; font-weight: 800; color: #546e7a; text-transform: uppercase; }
        .info-data { font-size: 2.2rem; font-weight: 900; margin-top: 10px; color: #263238; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="header">
        <h1>FLOOD MONITORING</h1>
        <p>SUNGAI PANCHOR, PERAK</p>
    </div>

    <div class="dashboard-main">
        <div class="card">
            <span class="info-label">Water Level</span>
            <div class="value-big" id="distText">--</div>
            <span style="font-weight: 900; color: #1976d2;">CM</span>
        </div>

        <div class="card">
            <div id="ledWater" class="led"></div>
            <div id="ledPower" class="led"></div>
            <div id="ledTilt" class="led"></div>
        </div>

        <div class="card" style="padding: 20px;">
            <span class="info-label">Alert Status</span>
            <div id="alarmBox" style="display:none; color: #d32f2f; text-align:center;">
                <span style="font-size: 45px;">🚨</span><br><b>DANGER</b>
            </div>
            <div id="safeBox" style="color: #388e3c; text-align:center;">
                <span style="font-size: 45px;">✅</span><br><b>STABLE</b>
            </div>
        </div>

        <div class="card chart-container">
            <div id="chartContainer" style="height: 100%; width: 100%;"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 30px;">
            <div class="card" style="flex: 1;">
                <span class="info-label">Structural Tilt</span>
                <div id="tiltVal" class="info-data" style="color: #ef6c00;">X:0 Y:0</div>
            </div>
            <div class="card" style="flex: 1;">
                <span class="info-label">Weather</span>
                <div id="rainVal" class="info-data" style="color: #0277bd;">-</div>
            </div>
        </div>
    </div>
</div>

<script>
// Use your existing MQTT credentials here
const broker = 'wss://00a99857651149babfcbd12d2e5e285f.s1.eu.hivemq.cloud:8884/mqtt';
const options = {
    clientId: 'WebClient_' + Math.random().toString(16).substr(2, 8),
    username: 'Hashir_Normazli',
    password: 'Hashir.2807' 
};

const client = mqtt.connect(broker, options);
var dps = []; 
var chart = new CanvasJS.Chart("chartContainer", {
    backgroundColor: "transparent",
    theme: "light2",
    axisY: { title: "Depth (cm)", includeZero: true, maximum: 100 },
    data: [{ type: "splineArea", color: "rgba(33, 150, 243, 0.1)", lineColor: "#1976d2", dataPoints: dps }]
});

client.on('connect', () => { client.subscribe('unimap/flood/data'); });

client.on('message', (topic, message) => {
    const data = JSON.parse(message.toString());
    document.getElementById("distText").innerText = Math.round(data.dist);
    document.getElementById("tiltVal").innerText = `X:${Math.round(data.tiltX)} Y:${Math.round(data.tiltY)}`;
    document.getElementById("rainVal").innerText = data.rain;

    const waterLed = document.getElementById("ledWater");
    const powerLed = document.getElementById("ledPower");
    const tiltLed = document.getElementById("ledTilt");
    const alarm = document.getElementById("alarmBox");
    const safe = document.getElementById("safeBox");

    waterLed.className = "led";
    if (data.dist > 40) { waterLed.classList.add("water-green"); alarm.style.display="none"; safe.style.display="block"; }
    else if (data.dist >= 30) { waterLed.classList.add("water-yellow"); alarm.style.display="none"; safe.style.display="block"; }
    else { waterLed.classList.add("water-red"); alarm.style.display="block"; safe.style.display="none"; }

    if (data.dist >= 20.0) powerLed.className = "led active power-blue";
    else powerLed.className = "led";

    if (Math.abs(data.tiltX) > 15 || Math.abs(data.tiltY) > 15) tiltLed.className = "led active tilt-orange";
    else tiltLed.className = "led";

    dps.push({x: new Date(), y: data.dist});
    if (dps.length > 20) dps.shift();
    chart.render();
});
</script>
</body>
</html>
