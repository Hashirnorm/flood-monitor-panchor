<!DOCTYPE html>
<html>
<head>
    <title>Flood Monitor - Sungai Panchor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Roboto', sans-serif; background-color: #f8f9fa; overflow: hidden; }
        .page-container { height: 100vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        
        /* Big Bold Header */
        .header { text-align: center; height: 18vh; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 3.5rem; color: #2c3e50; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .header p { margin: 10px 0 0; color: #34495e; font-size: 1.8rem; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; }

        /* Dashboard Grid */
        .dashboard-main { flex: 1; display: grid; grid-template-columns: 1fr 0.4fr 1fr; grid-template-rows: 1fr 0.9fr; gap: 35px; padding: 10px; }
        .card { background: white; border: 3px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 8px 8px 0px #333; transition: transform 0.2s; }
        
        /* LED Styles */
        .led-stack { display: flex; flex-direction: column; gap: 25px; align-items: center; transform: scale(0.9); }
        .led { width: 45px; height: 45px; border-radius: 50%; background: #eee; border: 3px solid #333; transition: 0.3s; }
        .led-label { font-size: 11px; margin-top: 6px; font-weight: 900; color: #333; text-transform: uppercase; }
        
        .water-green { background: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); }
        .water-yellow { background: #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .water-red { background: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); }
        .power-blue.active { background: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.6); }
        .tilt-orange.active { background: #e67e22; box-shadow: 0 0 20px rgba(230, 126, 34, 0.6); }

        .value-big { font-size: 5rem; font-weight: 900; color: #2c3e50; }
        .chart-container { grid-column: 1 / 3; padding: 15px; }
        .alarm-text { color: #e74c3c; font-weight: 900; font-size: 1.4rem; text-align: center; }
        .safe-text { color: #27ae60; font-weight: 900; font-size: 1.4rem; text-align: center; }

        .info-strip { flex: 1; background: white; border: 3px solid #333; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 6px 6px 0px #333; padding: 10px; margin-bottom: 15px; }
        .info-data { font-size: 1.5rem; font-weight: 900; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="header">
        <h1>FLOOD MONITORING SYSTEM</h1>
        <p>Sungai Panchor, Perak</p>
    </div>

    <div class="dashboard-main">
        <!-- Ultrasonic Card -->
        <div class="card">
            <span style="font-size: 14px; font-weight: bold; color: #7f8c8d;">WATER LEVEL</span>
            <div class="value-big" id="distText">--</div>
            <span style="font-size: 1.5rem; font-weight: bold; color: #bdc3c7;">CM</span>
        </div>

        <!-- Dashboard LEDs -->
        <div class="card">
            <div class="led-stack">
                <div style="text-align:center;">
                    <div id="ledWater" class="led"></div>
                    <div class="led-label">Water Status</div>
                </div>
                <div style="text-align:center;">
                    <div id="ledPower" class="led"></div>
                    <div class="led-label">Village Power</div>
                </div>
                <div style="text-align:center;">
                    <div id="ledTilt" class="led"></div>
                    <div class="led-label">Structure Tilt</div>
                </div>
            </div>
        </div>

        <!-- Alert System -->
        <div class="card">
            <div id="alarmBox" class="alarm-text" style="display:none;">
                <span style="font-size: 50px;">🚨</span><br>DANGER:<br>FLOOD DETECTED
            </div>
            <div id="safeBox" class="safe-text">
                <span style="font-size: 50px;">✅</span><br>SYSTEM:<br>STABLE
            </div>
        </div>

        <!-- Live Chart -->
        <div class="card chart-container">
            <div id="chartContainer" style="height: 100%; width: 100%;"></div>
        </div>

        <!-- Sidebar Sensors -->
        <div style="display: flex; flex-direction: column; justify-content: space-between;">
            <div class="info-strip">
                <span style="font-size: 0.8rem; font-weight: 700; color: #7f8c8d;">TILT AXIS</span>
                <div id="tiltVal" class="info-data" style="color: #e67e22;">X:0 Y:0</div>
            </div>
            <div class="info-strip">
                <span style="font-size: 0.8rem; font-weight: 700; color: #7f8c8d;">RAIN SENSOR</span>
                <div id="rainVal" class="info-data" style="color: #2980b9;">Waiting...</div>
            </div>
        </div>
    </div>
</div>

<script>
// --- MQTT Cloud Configuration ---
const broker = 'wss://00a99857651149babfcbd12d2e5e285f.s1.eu.hivemq.cloud:8884/mqtt';
const options = {
    clientId: 'Web_Panchor_' + Math.random().toString(16).substr(2, 8),
    username: 'Hashir_Normazli',
    password: 'Hashir.2807' 
};

const client = mqtt.connect(broker, options);

// --- Chart Setup ---
var dps = []; 
var chart = new CanvasJS.Chart("chartContainer", {
    theme: "light2",
    axisY: { title: "Level (cm)", includeZero: true, maximum: 100 },
    data: [{ type: "area", color: "rgba(52, 152, 219, 0.1)", lineColor: "#2980b9", dataPoints: dps }]
});

client.on('connect', () => {
    console.log("Connected to HiveMQ Cloud Successfully!");
    client.subscribe('unimap/flood/data');
});

client.on('message', (topic, message) => {
    const data = JSON.parse(message.toString());
    
    // 1. Update Numeric Displays
    document.getElementById("distText").innerText = Math.round(data.dist);
    document.getElementById("tiltVal").innerText = `X:${data.tiltX} Y:${data.tiltY}`;
    document.getElementById("rainVal").innerText = data.rain;

    // 2. UI Elements
    const waterLed = document.getElementById("ledWater");
    const powerLed = document.getElementById("ledPower");
    const tiltLed = document.getElementById("ledTilt");
    const alarm = document.getElementById("alarmBox");
    const safe = document.getElementById("safeBox");

    // --- Water Status Logic ---
    waterLed.className = "led";
    if (data.dist > 40) {
        waterLed.classList.add("water-green");
        alarm.style.display = "none"; safe.style.display = "block";
    } else if (data.dist >= 30) {
        waterLed.classList.add("water-yellow");
        alarm.style.display = "none"; safe.style.display = "block";
    } else {
        waterLed.classList.add("water-red");
        alarm.style.display = "block"; safe.style.display = "none";
    }

    // --- Power LED Logic (Blue) ---
    if (data.dist >= 20.0) {
        powerLed.className = "led active power-blue";
    } else {
        powerLed.className = "led"; // Turns OFF
    }

    // --- Tilt LED Logic (Orange) ---
    if (Math.abs(data.tiltX) > 15 || Math.abs(data.tiltY) > 15) {
        tiltLed.className = "led active tilt-orange";
    } else {
        tiltLed.className = "led";
    }

    // 3. Update Real-time Chart
    dps.push({x: new Date(), y: data.dist});
    if (dps.length > 20) dps.shift();
    chart.render();
});
</script>
</body>
</html>
