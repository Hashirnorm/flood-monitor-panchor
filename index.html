<!DOCTYPE html>
<html>
<head>
    <title>Flood Monitor - Sungai Panchor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* Light Blue Theme Background */
        body, html { height: 100%; margin: 0; font-family: 'Roboto', sans-serif; background-color: #eef5f9; }
        
        /* Layout Spacing (Margins on Left/Right) */
        .page-container { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 40px 10%; 
            box-sizing: border-box; 
        }
        
        /* Water Droplet Shaped Header */
        .header { 
            text-align: center; 
            background: #ffffff;
            border: 3px solid #333;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 50% 50% 50% 50% / 15px 15px 15px 15px; /* Slight droplet rounding */
            box-shadow: 0px 10px 20px rgba(0,0,0,0.05);
        }
        .header h1 { margin: 0; font-size: 2.8rem; color: #2c3e50; font-weight: 900; }
        .header p { margin: 5px 0 0; color: #3498db; font-weight: 700; letter-spacing: 2px; }

        .dashboard-main { 
            flex: 1; 
            display: grid; 
            grid-template-columns: 1.2fr 0.6fr 1fr; 
            grid-template-rows: 1.2fr 0.8fr; 
            gap: 25px; 
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #d1d9e6;
            box-shadow: 5px 5px 15px #c8d0d9; 
        }

        /* Buzzer Box - Smaller & Professional */
        .buzzer-card { 
            padding: 10px; 
            background: #fff;
        }
        .buzzer-title { font-size: 0.7rem; font-weight: 900; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }

        /* Bigger Sensor Boxes */
        .sensor-card-big { flex: 1.5; padding: 25px; }
        
        /* LED Styles */
        .led { width: 40px; height: 40px; border-radius: 50%; background: #eee; border: 2px solid #ccc; transition: 0.3s; margin: 10px auto; }
        .water-green { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .water-yellow { background: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .water-red { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .power-blue.active { background: #3498db; box-shadow: 0 0 15px #3498db; }
        .tilt-orange.active { background: #e67e22; box-shadow: 0 0 15px #e67e22; }

        .value-big { font-size: 4.5rem; font-weight: 900; color: #2c3e50; }
        .chart-container { grid-column: 1 / 3; }
        
        .status-text { font-weight: 900; font-size: 1rem; text-align: center; }
        .info-data { font-size: 1.8rem; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="header">
        <h1>FLOOD MONITORING SYSTEM</h1>
        <p>Sungai Panchor, Perak</p>
    </div>

    <div class="dashboard-main">
        <!-- Water Level -->
        <div class="card">
            <span style="font-size: 14px; font-weight: bold; color: #7f8c8d;">WATER LEVEL</span>
            <div class="value-big" id="distText">--</div>
            <span style="font-size: 1.2rem; font-weight: bold; color: #bdc3c7;">CENTIMETERS</span>
        </div>

        <!-- LEDs -->
        <div class="card">
            <div id="ledWater" class="led"></div>
            <div id="ledPower" class="led"></div>
            <div id="ledTilt" class="led"></div>
        </div>

        <!-- Professional Buzzer Box -->
        <div class="card buzzer-card">
            <div class="buzzer-title">Alert Status</div>
            <div id="alarmBox" style="display:none; color: #e74c3c; text-align:center;">
                <span style="font-size: 30px;">⚠️</span><br><b>CRITICAL: LEVEL HIGH</b>
            </div>
            <div id="safeBox" style="color: #27ae60; text-align:center;">
                <span style="font-size: 30px;">✅</span><br><b>NOMINAL OPERATIONS</b>
            </div>
        </div>

        <!-- Live Chart -->
        <div class="card chart-container">
            <div id="chartContainer" style="height: 100%; width: 100%;"></div>
        </div>

        <!-- Larger Sensor Data Boxes -->
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card sensor-card-big" style="background: linear-gradient(145deg, #ffffff, #f0f4f8);">
                <span style="font-size: 0.9rem; font-weight: 700; color: #7f8c8d;">STRUCTURAL TILT</span>
                <div id="tiltVal" class="info-data" style="color: #e67e22;">X:0 Y:0</div>
            </div>
            <div class="card sensor-card-big" style="background: linear-gradient(145deg, #ffffff, #f0f4f8);">
                <span style="font-size: 0.9rem; font-weight: 700; color: #7f8c8d;">PRECIPITATION STATUS</span>
                <div id="rainVal" class="info-data" style="color: #2980b9;">-</div>
            </div>
        </div>
    </div>
</div>

<script>
const broker = 'wss://00a99857651149babfcbd12d2e5e285f.s1.eu.hivemq.cloud:8884/mqtt';
const options = {
    clientId: 'Web_Panchor_' + Math.random().toString(16).substr(2, 8),
    username: 'Hashir_Normazli',
    password: 'Hashir.2807' 
};

const client = mqtt.connect(broker, options);

var dps = []; 
var chart = new CanvasJS.Chart("chartContainer", {
    backgroundColor: "transparent",
    theme: "light2",
    axisY: { title: "Level (cm)", includeZero: true, maximum: 100 },
    data: [{ type: "splineArea", color: "rgba(52, 152, 219, 0.2)", lineColor: "#2980b9", dataPoints: dps }]
});

client.on('connect', () => { client.subscribe('unimap/flood/data'); });

client.on('message', (topic, message) => {
    const data = JSON.parse(message.toString());
    document.getElementById("distText").innerText = Math.round(data.dist);
    document.getElementById("tiltVal").innerText = `X:${data.tiltX} Y:${data.tiltY}`;
    document.getElementById("rainVal").innerText = data.rain;

    const waterLed = document.getElementById("ledWater");
    const powerLed = document.getElementById("ledPower");
    const tiltLed = document.getElementById("ledTilt");
    const alarm = document.getElementById("alarmBox");
    const safe = document.getElementById("safeBox");

    // Logic updates
    waterLed.className = "led";
    if (data.dist > 40) {
        waterLed.classList.add("water-green");
        alarm.style.display = "none"; safe.style.display = "block";
    } else if (data.dist >= 30) {
        waterLed.classList.add("water-yellow");
        alarm.style.display = "none"; safe.style.display = "block";
    } else {
        waterLed.classList.add("water-red");
        alarm.style.display = "block"; safe.style.display = "none";
    }

    if (data.dist >= 20.0) powerLed.className = "led active power-blue";
    else powerLed.className = "led";

    if (Math.abs(data.tiltX) > 15 || Math.abs(data.tiltY) > 15) tiltLed.className = "led active tilt-orange";
    else tiltLed.className = "led";

    dps.push({x: new Date(), y: data.dist});
    if (dps.length > 20) dps.shift();
    chart.render();
});
</script>
</body>
</html>
